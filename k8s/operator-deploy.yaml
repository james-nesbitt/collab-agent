apiVersion: apps/v1
kind: Deployment
metadata:
  name: omp-operator
  namespace: omp-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: omp-operator
  template:
    metadata:
      labels:
        app: omp-operator
    spec:
      serviceAccountName: omp-operator
      containers:
        - name: operator
          image: "${OMP_REGISTRY}/omp-operator:${OMP_IMAGE_TAG}"
          imagePullPolicy: Always
          env:
            - name: OMP_SESSION_IMAGE
              value: "${OMP_REGISTRY}/omp-session:${OMP_SESSION_IMAGE_TAG}"
            - name: OMP_GSM_PROJECT
              value: "${GCP_PROJECT}"
            - name: OMP_RELAY
              value: ""
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
