# Global secret-shape backstops (~/.omp/agent/secrets.yml).
#
# Env-var auto-collection is the PRIMARY obfuscation trigger: any injected var
# whose NAME matches KEY|SECRET|TOKEN|PASSWORD|PASS|AUTH|CREDENTIAL|PRIVATE|OAUTH
# (value >= 8 chars) is obfuscated automatically. These regex entries are a
# value-SHAPE backstop for cases the name pattern would miss (e.g. a credential
# captured in a tool result, a stray env var, or a config file read).
#
# Mode `obfuscate` (default): the value is replaced with a reversible placeholder
# like #AB12# so the agent can still pass it through to tool arguments without
# ever seeing it. Mode `replace`: a fixed string with no recoverable value.

# Bearer tokens in Authorization headers (any service).
- type: regex
  content: "/bearer\\s+[a-zA-Z0-9._~+\\/=-]{8,}/i"

# GitLab personal access tokens — always prefixed glpat-.
- type: regex
  content: "glpat-[A-Za-z0-9_-]{20,}"

# Jenkins API tokens — 32-char hex strings (the format Jenkins generates).
- type: regex
  content: "[0-9a-f]{32}"

# Atlassian API tokens (JIRA / Confluence) — base64url, 24+ chars with no fixed
# prefix; catch them by length + charset when they follow a common field name.
- type: regex
  content: "(?i)(api[_-]?token|authorization)[\"']?\\s*[:=]\\s*[\"']?[A-Za-z0-9+/=_-]{24,}"

# Basic-auth credentials embedded in URLs — user:pass@host.
- type: regex
  content: "//[^@\\s]{4,}@"
  mode: replace
  replacement: "//**REDACTED**@"
