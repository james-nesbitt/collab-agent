# Global secret-shape backstops (~/.omp/agent/secrets.yml).
#
# Env-var auto-collection is the PRIMARY obfuscation trigger: any injected var
# whose NAME matches KEY|SECRET|TOKEN|PASSWORD|PASS|AUTH|CREDENTIAL|PRIVATE|OAUTH
# (value >= 8 chars) is obfuscated automatically. These regex entries are a
# value-SHAPE backstop for cases the name pattern would miss.
#
# Add one `type: regex` entry per service value shape, e.g. the ghp_ example below.

- type: regex
  content: "/bearer\\s+[a-zA-Z0-9._~+\\/=-]{8,}/i"

# - type: regex
#   content: "ghp_[0-9A-Za-z]{36}"
